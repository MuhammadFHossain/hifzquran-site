<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family:"Fraunces"; src:url("assets/fonts/Fraunces-VF.ttf") format("truetype-variations"); font-weight:100 900; }
  @font-face { font-family:"Fraunces"; src:url("assets/fonts/Fraunces-Italic-VF.ttf") format("truetype-variations"); font-weight:100 900; font-style:italic; }
  @font-face { font-family:"UthmanicHafs"; src:url("assets/fonts/UthmanicHafsV22.ttf") format("truetype"); }
  * { margin:0; box-sizing:border-box; }
  body { width:1200px; height:630px; overflow:hidden;
    background:#14120D;
    color:#E9E2D2; font-family:"Fraunces",Georgia,serif;
    display:flex; align-items:center; padding:0 88px; position:relative; }
  .halo { position:absolute; right:24px; top:50%; transform:translateY(-50%); width:440px; opacity:.12; }
  .wm { display:flex; align-items:center; gap:16px; margin-bottom:34px; }
  .wm img { width:46px; height:46px; }
  .wm .t { font-size:30px; font-weight:520; letter-spacing:-.01em; }
  .wm .t i { color:#3FC3DA; font-style:italic; }
  h1 { font-size:82px; line-height:1.04; font-weight:470; letter-spacing:-.015em; }
  h1 .g { color:#C9A85C; font-style:italic; }
  p { margin-top:26px; font-family:-apple-system,system-ui,sans-serif; font-size:26px; color:#B4AB98; max-width:20ch; line-height:1.4; }
  .ayah { position:absolute; left:88px; bottom:52px; font-family:"UthmanicHafs",serif; direction:rtl; font-size:34px; color:#C9A85C; opacity:.6; }
  .free { position:absolute; right:88px; bottom:56px; font-family:-apple-system,system-ui,sans-serif; font-size:20px; letter-spacing:.14em; text-transform:uppercase; color:#3FC3DA; font-weight:600; }
</style>
</head>
<body>
  <img class="halo" src="assets/img/mark.png" alt="">
  <div>
    <div class="wm">
      <img src="assets/img/mark.png" alt="">
      <span class="t">Hifz <i>Quran</i></span>
    </div>
    <h1>Repeat, recite,<br><span class="g">remember.</span></h1>
    <p>The Quran app for those who want to memorize it.</p>
  </div>
  <div class="ayah" lang="ar" dir="rtl">وَلَقَدۡ يَسَّرۡنَا ٱلۡقُرۡءَانَ لِلذِّكۡرِ</div>
  <div class="free">Free · On device · No ads</div>
</body>
</html>
